        title: "Переглядайте та копіюйте картки"
        body: "На сторінці Картки показано картки всіх користувачів. Знайшли корисну? Скопіюйте її до однієї зі своїх колекцій кнопкою Додати до."
      import:
        title: "Імпорт та експорт (CSV)"
        body: "Переносьте картки у вигляді CSV-файлів через меню Мої картки або з будь-якої колекції — зручно для резервних копій чи масового додавання."
      search:
        title: "Шукайте будь-коли"
        body: "Використовуйте поле пошуку на сторінках Колекції та Картки, щоб швидко знайти набір або конкретне слово."
